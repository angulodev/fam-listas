<!DOCTYPE html>
<html lang="es" data-theme="verde">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Listas · Familia</title>
<meta name="description" content="Listas compartidas de compras, tareas y pendientes — sincronizadas en vivo.">
<meta name="theme-color" content="#157B57" id="metaTheme">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3F6F2; --card:#FFFFFF; --ink:#21322A; --muted:#70807A;
  --pri:#157B57; --pri-dark:#0B573C; --pri-soft:#E3F0E9;
  --acc:#F0973B; --acc-soft:#FCEEDC;
  --line:#E1E9E2; --done:#9AAAA1; --danger:#C0492F;
  --radius:18px; --shadow:0 2px 10px rgba(33,50,42,.07);
}
[data-theme="oscuro"]{
  --bg:#141F1A; --card:#1D2B24; --ink:#E9F1EB; --muted:#8FA69A;
  --pri:#33B187; --pri-dark:#7FE0BD; --pri-soft:#234437;
  --acc:#F0A45C; --acc-soft:#3D3226;
  --line:#2C3B33; --done:#5F7268; --danger:#E07458;
  --shadow:0 2px 10px rgba(0,0,0,.3);
}
[data-theme="cielo"]{
  --bg:#EFF4FA; --card:#FFFFFF; --ink:#1E2A3A; --muted:#6C7B90;
  --pri:#1D6FB8; --pri-dark:#0F4C82; --pri-soft:#E0EDF9;
  --acc:#E8833A; --acc-soft:#FBEBDC;
  --line:#DFE7F0; --done:#9AA8B8; --danger:#C0492F;
}
[data-theme="rosa"]{
  --bg:#FBF2F6; --card:#FFFFFF; --ink:#36202B; --muted:#9A7386;
  --pri:#C74B7F; --pri-dark:#93275A; --pri-soft:#F8E1EB;
  --acc:#7A65C9; --acc-soft:#EAE5F8;
  --line:#F0DCE5; --done:#C6A5B5; --danger:#B0302F;
}
[data-theme="lila"]{
  --bg:#F7F3FB; --card:#FFFFFF; --ink:#2C2338; --muted:#82758F;
  --pri:#8A5BC4; --pri-dark:#5E378F; --pri-soft:#EEE6F8;
  --acc:#E0779A; --acc-soft:#FAE3EB;
  --line:#E7DEF1; --done:#B4A7C4; --danger:#B0302F;
}
[data-theme="menta"]{
  --bg:#F0F7F5; --card:#FFFFFF; --ink:#1E322E; --muted:#6E837E;
  --pri:#0E9C8D; --pri-dark:#086B60; --pri-soft:#DFF3F0;
  --acc:#F08C4D; --acc-soft:#FBE9DD;
  --line:#DEEAE6; --done:#9BB3AD; --danger:#C0492F;
}
[data-theme="coral"]{
  --bg:#FBF3F1; --card:#FFFFFF; --ink:#38241F; --muted:#97786F;
  --pri:#E4574D; --pri-dark:#A83229; --pri-soft:#FBE3E1;
  --acc:#2E9C8F; --acc-soft:#DFF2EF;
  --line:#F0DFDB; --done:#C7A69E; --danger:#8E1F1F;
}
[data-theme="atardecer"]{
  --bg:#FAF2EB; --card:#FFFFFF; --ink:#3A2A20; --muted:#93796A;
  --pri:#C2571B; --pri-dark:#8C3B0E; --pri-soft:#F8E4D5;
  --acc:#8C4E9E; --acc-soft:#F0E3F4;
  --line:#EFE0D3; --done:#C0AA99; --danger:#B0302F;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Nunito',system-ui,sans-serif; font-size:16px; line-height:1.45;
  min-height:100dvh; padding-bottom:env(safe-area-inset-bottom);
  transition:background .25s ease;
}
h1,h2,h3{font-family:'Fredoka',system-ui,sans-serif; font-weight:600; letter-spacing:.01em}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; font-size:inherit}
input{font-family:inherit; font-size:inherit; color:inherit}
a{color:var(--pri)}
.app{max-width:520px; margin:0 auto; padding:0 16px 110px}

/* ---------- Header ---------- */
.topbar{display:flex; align-items:center; gap:10px; padding:calc(14px + env(safe-area-inset-top)) 0 10px}
.topbar .brand{font-family:'Fredoka'; font-weight:600; font-size:1.35rem; color:var(--pri-dark); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.topbar .brand span{color:var(--acc)}
.avatar{width:38px; height:38px; border-radius:50%; background:var(--pri-soft); color:var(--pri-dark);
  display:grid; place-items:center; font-weight:800; font-size:.85rem; overflow:hidden; border:2px solid var(--card); box-shadow:var(--shadow); flex-shrink:0}
.avatar img{width:100%; height:100%; object-fit:cover}
.back-btn{width:38px; height:38px; border-radius:12px; background:var(--card); box-shadow:var(--shadow);
  display:grid; place-items:center; font-size:1.05rem; color:var(--pri-dark); flex-shrink:0}
.greet{color:var(--muted); font-weight:700; margin:2px 4px 14px}

/* ---------- Login ---------- */
.login{min-height:80dvh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; gap:14px; padding:24px}
.login .mark{font-size:3.2rem; line-height:1}
.login h1{font-size:1.9rem; margin:0; color:var(--pri-dark)}
.login p{color:var(--muted); margin:0 0 10px; max-width:280px}
.btn-google{display:flex; align-items:center; gap:12px; background:var(--card); box-shadow:var(--shadow);
  border:1px solid var(--line); border-radius:999px; padding:13px 22px; font-weight:800}
.btn-google svg{width:20px; height:20px}

/* ---------- Dashboard ---------- */
.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px}
.stat{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:12px 10px; text-align:center}
.stat .n{font-family:'Fredoka'; font-size:1.35rem; font-weight:600; color:var(--pri-dark); line-height:1.1}
.stat .n.acc{color:var(--acc)}
.stat .l{font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-top:3px}
.chart-card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 16px 10px; margin-bottom:10px}
.chart-card .title{font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:8px}
.chart{display:flex; align-items:flex-end; gap:6px; height:74px}
.chart .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end}
.chart .bar{width:100%; max-width:26px; border-radius:6px 6px 3px 3px; background:var(--pri-soft); position:relative; transition:height .4s ease; min-height:4px}
.chart .bar.hit{background:var(--pri)}
.chart .bar .v{position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:.66rem; font-weight:800; color:var(--pri-dark)}
.chart .d{font-size:.66rem; font-weight:800; color:var(--muted)}
.chart-card .wk{font-size:.78rem; color:var(--muted); font-weight:700; margin-top:8px}
.mini-item{display:flex; align-items:center; gap:11px; background:var(--card); border-radius:14px;
  padding:10px 13px; margin-bottom:8px; box-shadow:var(--shadow); width:100%; text-align:left}
.mini-item .me{width:34px; height:34px; border-radius:11px; display:grid; place-items:center; font-size:1.05rem; background:var(--pri-soft); flex-shrink:0}
.mini-item .mt{flex:1; min-width:0; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.mini-item .mt small{display:block; color:var(--muted); font-weight:700; font-size:.72rem}
.mini-item .arr{color:var(--muted)}
.list-card.continue{border:2px solid var(--pri)}
.feed{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:4px 14px; margin-bottom:4px}
.feed .f{display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); font-size:.86rem; align-items:center; min-width:0}
.feed .f > span:not(.tm){flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.feed .f:last-child{border-bottom:none}
.feed .f .tm{color:var(--muted); font-size:.72rem; white-space:nowrap; flex-shrink:0}

/* ---------- Cards de listas ---------- */
.section-label{font-size:.78rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:16px 4px 8px}
.list-card{display:flex; align-items:center; gap:13px; background:var(--card); border-radius:var(--radius);
  padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow); width:100%; text-align:left; transition:transform .12s ease}
.list-card:active{transform:scale(.98)}
.list-card .emoji{width:44px; height:44px; border-radius:14px; display:grid; place-items:center; font-size:1.3rem; flex-shrink:0; background:var(--pri-soft)}
.list-card .info{flex:1; min-width:0}
.list-card .name{font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.progress{height:5px; border-radius:99px; background:var(--line); margin-top:7px; overflow:hidden}
.progress i{display:block; height:100%; border-radius:99px; background:var(--pri); transition:width .4s ease}
.list-card .meta{font-size:.75rem; color:var(--muted); margin-top:4px}
.list-card .count{min-width:30px; height:30px; padding:0 9px; border-radius:999px; background:var(--acc-soft); color:var(--acc);
  display:grid; place-items:center; font-weight:800; font-size:.9rem; filter:saturate(1.4) brightness(.9)}
.list-card .count.zero{background:var(--pri-soft); color:var(--pri-dark); filter:none}
.empty{text-align:center; color:var(--muted); padding:34px 20px; background:var(--card); border-radius:var(--radius); border:1.5px dashed var(--line)}
.empty .big{font-size:2rem}
.home-actions{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px}
.action-tile{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px;
  display:flex; flex-direction:column; align-items:flex-start; gap:4px; font-weight:800; text-align:left}
.action-tile .ico{font-size:1.3rem}
.action-tile small{color:var(--muted); font-weight:600}

/* ---------- Vista de lista ---------- */
.chip-row{display:flex; gap:6px; flex-wrap:wrap; margin:4px 0 14px}
.chip{font-size:.78rem; font-weight:800; padding:4px 11px; border-radius:999px; background:var(--pri-soft); color:var(--pri-dark)}
.chip.orange{background:var(--acc-soft); color:var(--acc); filter:saturate(1.4) brightness(.85)}
.item{display:flex; align-items:center; gap:11px; background:var(--card); border-radius:14px;
  padding:11px 13px; margin-bottom:8px; box-shadow:var(--shadow); animation:pop .18s ease}
@keyframes pop{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}
.item .status{width:24px; height:24px; border-radius:50%; flex-shrink:0; display:grid; place-items:center;
  font-size:.8rem; font-weight:800; background:var(--line); color:transparent}
.item .status.ok{background:var(--pri); color:#fff}
.item .status.nf{background:var(--acc-soft); color:var(--acc); filter:saturate(1.4) brightness(.85)}
.who.nf-txt{color:var(--acc); filter:saturate(1.4) brightness(.8); font-weight:700}
.stats2{grid-template-columns:1fr 1fr}
.stats2 .stat .n{font-size:1.2rem}
.item .thumb{width:40px; height:40px; border-radius:10px; object-fit:cover; flex-shrink:0; background:var(--line)}
.item .body{flex:1; min-width:0}
.item .content{font-weight:700; transition:color .2s}
.item .qty{color:var(--muted); font-weight:600}
.item .price-tag{font-size:.78rem; font-weight:800; color:var(--pri-dark); background:var(--pri-soft); border-radius:8px; padding:1px 7px; margin-left:5px; white-space:nowrap}
.item.done .content{color:var(--done); text-decoration:line-through; text-decoration-thickness:2px}
.item .who{font-size:.74rem; color:var(--muted); margin-top:1px}
.item .linkico{font-size:.95rem; text-decoration:none; padding:4px}
.item .del{color:var(--line); font-size:1.1rem; padding:4px 5px; filter:brightness(.85)}
.item .del:active{color:var(--danger)}
.item.done{opacity:.75}
.done-head{display:flex; align-items:center; gap:8px; width:100%; padding:10px 6px; margin:6px 0 4px;
  font-size:.8rem; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--muted)}
.done-head .arrow{margin-left:auto; transition:transform .15s}
.done-head.open .arrow{transform:rotate(90deg)}

/* Barra de navegación inferior (opcional) */
.bottomnav{position:fixed; bottom:0; left:0; right:0; z-index:45;
  background:var(--card); border-top:1.5px solid var(--line);
  display:flex; justify-content:space-around; gap:2px;
  padding:6px 8px calc(8px + env(safe-area-inset-bottom));
  box-shadow:0 -2px 14px rgba(0,0,0,.08)}
.bottomnav .nv{flex:1; display:flex; flex-direction:column; align-items:center; gap:1px;
  font-size:.68rem; font-weight:800; color:var(--muted); padding:4px 2px; border-radius:12px; max-width:90px}
.bottomnav .nv span{font-size:1.15rem; line-height:1.2}
.bottomnav .nv.on{color:var(--pri-dark); background:var(--pri-soft)}
body.has-nav .app{padding-bottom:150px}
body.has-nav .topbar{position:sticky; top:0; z-index:35; background:var(--bg); box-shadow:0 3px 10px rgba(0,0,0,.05); margin:0 -16px; padding-left:16px; padding-right:16px}
body.has-nav .fab{bottom:calc(84px + env(safe-area-inset-bottom))}
body.has-nav .toast{bottom:calc(150px + env(safe-area-inset-bottom))}

/* Botón flotante de agregar */
.fab{position:fixed; right:max(20px, calc(50% - 240px)); bottom:calc(22px + env(safe-area-inset-bottom));
  width:58px; height:58px; border-radius:50%; background:var(--pri); color:#fff; font-size:1.7rem;
  display:grid; place-items:center; box-shadow:0 6px 20px rgba(0,0,0,.28); z-index:40;
  transition:transform .12s ease}
.fab:active{transform:scale(.92)}

/* ---------- Ticket compacto ---------- */
.ticket{position:relative; background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
  margin:16px 0 8px; padding:13px 16px; overflow:hidden}
.ticket::before,.ticket::after{content:''; position:absolute; width:20px; height:20px; border-radius:50%; background:var(--bg); top:50%; transform:translateY(-50%)}
.ticket::before{left:-10px} .ticket::after{right:-10px}
.ticket .row{display:flex; align-items:center; gap:10px}
.ticket .label{font-size:.68rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}
.ticket .code{font-family:ui-monospace,'SF Mono',Menlo,monospace; font-size:1.15rem; font-weight:700;
  letter-spacing:.2em; color:var(--pri-dark)}
.ticket .spacer{flex:1}
.btn-mini{background:var(--pri-soft); color:var(--pri-dark); font-weight:800; border-radius:11px; padding:8px 12px; font-size:.85rem; display:flex; align-items:center; gap:5px}
.btn-mini.wa{background:#DFF5E4; color:#128C4B}
[data-theme="oscuro"] .btn-mini.wa{background:#1E4030; color:#5FD08A}
.members{display:flex; align-items:center; margin-top:10px}
.members .avatar{margin-right:-8px; width:28px; height:28px; font-size:.7rem}
.members .mnames{margin-left:16px; font-size:.8rem; color:var(--muted)}
.members-line{margin:-4px 2px 14px}
.members-line .avatar{width:24px; height:24px; font-size:.62rem}
.members-line .mnames{margin-left:14px; font-size:.78rem}
.req{display:flex; align-items:center; gap:10px; background:var(--acc-soft); border-radius:14px; padding:10px 12px; margin-bottom:8px}
.req .avatar{width:32px; height:32px; font-size:.75rem}
.req .nm{flex:1; font-weight:800; min-width:0; overflow:hidden; text-overflow:ellipsis}
.req .nm small{display:block; font-weight:700; color:var(--muted); font-size:.72rem}
.req .ok{background:var(--pri); color:#fff; border-radius:10px; padding:7px 13px; font-weight:800; font-size:.85rem}
.req .no{color:var(--danger); font-weight:800; padding:7px 9px; font-size:1rem}
.list-card.waiting{opacity:.7}
.code-big{font-family:ui-monospace,'SF Mono',Menlo,monospace; font-size:2rem; font-weight:700; letter-spacing:.3em;
  color:var(--pri-dark); text-align:center; margin:4px 0 14px; background:var(--bg); border:2px dashed var(--line); border-radius:16px; padding:14px}

/* ---------- Sheets / modales ---------- */
.overlay{position:fixed; inset:0; background:rgba(10,18,14,.5); display:grid; place-items:end center; z-index:50; animation:fade .15s ease}
@keyframes fade{from{opacity:0}}
.sheet{background:var(--card); border-radius:24px 24px 0 0; width:100%; max-width:520px;
  padding:22px 20px calc(24px + env(safe-area-inset-bottom)); animation:up .2s ease; max-height:88dvh; overflow-y:auto}
@keyframes up{from{transform:translateY(30px); opacity:0}}
.sheet h3{margin:0 0 14px; font-size:1.25rem; color:var(--pri-dark)}
.sheet p.msg{color:var(--muted); margin:0 0 16px}
.field{margin-bottom:13px}
.field label{display:block; font-size:.8rem; font-weight:800; color:var(--muted); margin-bottom:6px}
.field input{width:100%; border:1.5px solid var(--line); border-radius:14px; padding:12px 14px; outline:none; background:var(--bg)}
.field input:focus{border-color:var(--pri)}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.type-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px}
.type-opt{border:1.5px solid var(--line); border-radius:14px; padding:10px 4px; text-align:center; font-size:.76rem; font-weight:800;
  display:flex; flex-direction:column; gap:2px; align-items:center; background:var(--bg)}
.type-opt .e{font-size:1.25rem}
.type-opt.sel{border-color:var(--pri); background:var(--pri-soft); color:var(--pri-dark)}
.theme-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px}
.theme-opt{border:2px solid var(--line); border-radius:14px; padding:8px 4px; display:flex; flex-direction:column; align-items:center; gap:5px;
  font-size:.72rem; font-weight:800; color:var(--muted)}
.theme-opt .sw{width:34px; height:34px; border-radius:50%; border:3px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.2)}
.theme-opt.sel{border-color:var(--pri); color:var(--pri-dark)}
.photo-drop{border:1.5px dashed var(--line); border-radius:14px; padding:12px; display:flex; align-items:center; gap:12px; background:var(--bg)}
.photo-drop img{width:52px; height:52px; border-radius:10px; object-fit:cover}
.photo-drop .txt{flex:1; font-size:.85rem; color:var(--muted); font-weight:700}
.btn-primary{width:100%; background:var(--pri); color:#fff; font-weight:800; border-radius:999px; padding:14px; margin-top:6px; font-size:1rem}
.btn-primary:disabled{opacity:.5}
.btn-primary.danger{background:var(--danger)}
.btn-ghost{width:100%; padding:12px; color:var(--muted); font-weight:700}
.btn-danger-ghost{width:100%; padding:12px; color:var(--danger); font-weight:800}
.profile-head{display:flex; align-items:center; gap:12px; margin-bottom:16px}
.profile-head .avatar{width:52px; height:52px; font-size:1.1rem}
.profile-head .em{font-size:.82rem; color:var(--muted)}
.detail-photo{width:100%; max-height:260px; object-fit:cover; border-radius:16px; margin-bottom:12px}
.detail-rows{margin-bottom:8px}
.detail-rows .dr{display:flex; justify-content:space-between; gap:12px; padding:9px 2px; border-bottom:1px solid var(--line); font-size:.92rem}
.detail-rows .dr b{color:var(--muted); font-weight:800; font-size:.78rem; text-transform:uppercase; letter-spacing:.05em}

/* ---------- Toast ---------- */
.toast{position:fixed; left:50%; bottom:calc(100px + env(safe-area-inset-bottom)); transform:translateX(-50%);
  background:var(--ink); color:var(--bg); padding:10px 18px; border-radius:999px; font-weight:700; font-size:.9rem;
  z-index:99; animation:fade .15s ease; box-shadow:0 6px 20px rgba(0,0,0,.25); white-space:nowrap}
.loader{text-align:center; color:var(--muted); padding:40px 0}
@media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important} }

/* ============================================================
   REFRESH VISUAL v3.2 — minimalista, aire, color dinámico
   (overrides: esta capa manda sobre las reglas anteriores)
   ============================================================ */
:root{--radius:20px}
body{
  background:
    radial-gradient(120% 46% at 50% -8%, color-mix(in srgb, var(--pri) 9%, transparent), transparent 70%),
    var(--bg);
}
/* Tarjetas: borde fino + sombra mínima, en vez de sombra pesada */
.list-card, .item, .mini-item, .feed, .empty, .stat, .action-tile, .req{
  border:1px solid var(--line);
  box-shadow:0 1px 2px rgba(0,0,0,.03);
}
.list-card, .mini-item{margin-bottom:12px}
.list-card{padding:16px}
.empty{border-style:dashed; background:color-mix(in srgb, var(--card) 60%, transparent)}

/* Respiración entre secciones */
.greet{font-family:'Fredoka'; font-weight:600; font-size:1.4rem; color:var(--ink); margin:8px 4px 22px}
.section-label{
  margin:30px 6px 12px; font-size:.7rem; letter-spacing:.14em;
  color:color-mix(in srgb, var(--muted) 75%, transparent);
}
.chip-row{margin:6px 0 18px}

/* Stats con tinte dinámico del tema */
.stats{gap:12px; margin-bottom:4px}
.stat{
  background:color-mix(in srgb, var(--pri) 5%, var(--card));
  border-radius:18px; padding:16px 10px;
}

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://mseiqleparjnchmgnwwa.supabase.co';

const $app = document.getElementById('app');
const SKEL = `

const TYPES = {
  compras:    { e:'🛒', label:'Compras' },
  tareas:     { e:'🧹', label:'Tareas' },
  pendientes: { e:'📌', label:'Pendientes' },

};
const THEMES = {
  verde:     { label:'Verde',     sw:'#157B57', bar:'#157B57' },
  oscuro:    { label:'Oscuro',    sw:'#1D2B24', bar:'#141F1A' },
  cielo:     { label:'Cielo',     sw:'#1D6FB8', bar:'#1D6FB8' },

};

let session = null;
let channel = null;
const esc = s => (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const firstName = u => (u?.first_name || u?.display_name?.trim() || u?.email || '?').split(/[\s@]/)[0];
const initial = u => firstName(u).charAt(0).toUpperCase();
const clp = n => new Intl.NumberFormat('es-CL', { style:'currency', currency:'CLP', maximumFractionDigits:0 }).format(n);

function fmtWhen(ts){
  if (!ts) return '';
  const d = new Date(ts), now = new Date();
  const hm = d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
  const same = (a,b) => a.toDateString() === b.toDateString();
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (same(d, now)) return `hoy ${hm}`;
  if (same(d, yest)) return `ayer ${hm}`;
  return d.toLocaleDateString('es-CL', { day:'numeric', month:'short' }) + ` · ${hm}`;
}

}

/* ---------------- Temas ---------------- */
function applyTheme(name){
  if (!THEMES[name]) name = 'verde';
  document.documentElement.dataset.theme = name;
  document.getElementById('metaTheme').content = THEMES[name].bar;
  localStorage.setItem('fam-theme', name);
}
applyTheme(localStorage.getItem('fam-theme') || 'verde');

/* ---------------- Auth ---------------- */
async function init(){
  const { data } = await sb.auth.getSession();
  session = data.session;
  sb.auth.onAuthStateChange((_e, s) => {
    const was = !!session; session = s;
    if (!!s !== was) route();
  });
  if (session) await syncProfile();
  window.addEventListener('hashchange', () => {
    if (document.startViewTransition && !matchMedia('(prefers-reduced-motion: reduce)').matches){
      document.startViewTransition(() => route());
    } else route();
  });
  route();
}

async function syncProfile(){
  try{
    const u = session.user;
    const meta = u.user_metadata || {};
    const { data: me } = await sb.from('sys_user').select('first_name, avatar_url').eq('id', u.id).single();
    if (me && !me.first_name && (meta.full_name || meta.name)){
      const parts = (meta.full_name || meta.name).split(' ');
      await sb.from('sys_user').update({
        first_name: parts[0],
        last_name: parts.slice(1).join(' ') || null,
        avatar_url: meta.avatar_url || meta.picture || null,
        last_login_at: new Date().toISOString(),
      }).eq('id', u.id);
    }
  }catch(e){ console.warn('syncProfile', e); }
}

function loginView(){
  $app.innerHTML = `
    <div class="login">
      <div class="mark">🛒</div>
      <h1>Listas de la familia</h1>
      <p>Compras, tareas y pendientes compartidos — se actualizan en vivo en todos los celulares.</p>
      <button class="btn-google" id="btnGoogle">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15A11 11 0 0 0 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
        Entrar con Google
      </button>
    </div>`;
  document.getElementById('btnGoogle').onclick = () =>
    sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: location.origin + location.pathname } });
}

/* ---------------- Barra de navegación (opcional) ---------------- */
const navEnabled = () => localStorage.getItem('fam-nav') === 'on';

function renderNav(){
  const existing = document.getElementById('bottomNav');
  if (!navEnabled() || !session){
    existing?.remove();
    document.body.classList.remove('has-nav');
    return;
  }
  document.body.classList.add('has-nav');
  const h = location.hash;
  const act = h === '#/new' ? 'new'
    : h.startsWith('#/join') ? 'join'
    : h === '#/profile' ? 'profile'
    : (!h || h.startsWith('#/see/')) ? 'home' : '';
  const html = `
    <button class="nv ${act==='home'?'on':''}" data-nv=""><span>🏠</span>Inicio</button>
    <button class="nv ${act==='new'?'on':''}" data-nv="#/new"><span>➕</span>Nueva</button>
    <button class="nv ${act==='join'?'on':''}" data-nv="#/join"><span>🎟️</span>Unirme</button>
    <button class="nv ${act==='profile'?'on':''}" data-nv="#/profile"><span>👤</span>Perfil</button>`;
  let nav = existing;
  if (!nav){
    nav = document.createElement('nav');
    nav.id = 'bottomNav';
    nav.className = 'bottomnav';
    document.body.appendChild(nav);
  }
  nav.innerHTML = html;
  nav.querySelectorAll('[data-nv]').forEach(b => b.onclick = () => {
    const target = b.dataset.nv;
    if (location.hash === target) return;
    if (!target && !location.hash) return homeView();
    location.hash = target;
  });
}

/* ---------------- Router ---------------- */
function route(){
  if (channel){ sb.removeChannel(channel); channel = null; }
  const h = location.hash;
  const j = h.match(/^#\/join(?:\/([A-Z0-9]{4,10}))?$/i);
  if (!session){
    if (j && j[1]) localStorage.setItem('fam-join', j[1].toUpperCase());
    renderNav();
    return loginView();
  }
  const pend = localStorage.getItem('fam-join');
  if (pend){
    localStorage.removeItem('fam-join');
    location.hash = '#/join/' + pend;
    return;
  }
  renderNav();
  const m = h.match(/^#\/list\/([0-9a-f-]+)/i);
  if (m) return listView(m[1]);
  if (j) return joinView((j[1] || '').toUpperCase());
  if (h === '#/new') return newListView();
  if (h === '#/profile') return profileView();
  const s = h.match(/^#\/see\/(pending|today|week|month)$/);
  if (s) return seeView(s[1]);
  homeView();
}

/* ---------------- Home / Dashboard ---------------- */
async function homeView(){
  $app.innerHTML = SKEL;

  const iso60 = new Date(Date.now() - 60*86400000).toISOString();
  const [{ data: lists, error }, { data: items }, { data: myRow }, { data: myMems }, { data: users }, { data: acts }, { data: memsAll }] = await Promise.all([
    sb.from('fam_list').select('*').eq('is_archived', false).order('created_at'),
    sb.from('fam_item').select('id, list_id, content, quantity, is_done, done_at, price, assigned_to, created_by, created_at, done_by, not_found').or(`is_done.eq.false,done_at.gte.${iso60}`),
    sb.from('sys_user').select('first_name, avatar_url').eq('id', me.id).single(),
    sb.from('fam_list_member').select('list_id, status').eq('user_id', me.id),
    sb.from('sys_user').select('id, first_name, display_name, email, avatar_url'),
    sb.from('fam_activity').select('list_id, item_content, action, actor_id, created_at')
      .order('created_at', { ascending: false }).limit(10),
    sb.from('fam_list_member').select('list_id, user_id, status'),
  ]);
  if (error){ $app.innerHTML = `<div class="empty">Error cargando listas: ${esc(error.message)}</div>`; return; }
  const statusByList = Object.fromEntries((myMems||[]).map(m => [m.list_id, m.status]));
  const userById = Object.fromEntries((users||[]).map(u => [u.id, u]));
  const membersByList = {};
  (memsAll||[]).forEach(m => {
    if (m.status === 'approved') (membersByList[m.list_id] = membersByList[m.list_id] || []).push(m.user_id);
  });

  /* --- estadísticas --- */
  const all = items || [];
  const now = new Date();
  const dayKey = d => d.toISOString().slice(0,10);
  const last7 = [...Array(7)].map((_,i) => { const d = new Date(now); d.setDate(now.getDate()-(6-i)); return d; });
  const doneByDay = Object.fromEntries(last7.map(d => [dayKey(d), 0]));
  let done7 = 0, spend7 = 0, spendMonth = 0;
  const perList = {};
  all.forEach(i => {
    perList[i.list_id] = perList[i.list_id] || { total:0, done:0 };
    perList[i.list_id].total++;
    if (i.is_done){
      perList[i.list_id].done++;
      if (i.done_at){
        const k = i.done_at.slice(0,10);
        if (k in doneByDay){ doneByDay[k]++; done7++; if (i.price) spend7 += Number(i.price); }
        const dd = new Date(i.done_at);
        if (dd.getMonth() === now.getMonth() && dd.getFullYear() === now.getFullYear() && i.price)
          spendMonth += Number(i.price);
      }
    }
  });
  const pendTotal = all.filter(i => !i.is_done).length;
  const doneToday = doneByDay[dayKey(now)] || 0;
  const TIPO_HOY = 'Listos';
  const listById = Object.fromEntries((lists||[]).map(l => [l.id, l]));
  const lEmoji = l => l.icon ? esc(l.icon) : (TYPES[l.list_type] || TYPES.otra).e;
  const lastByList = {};
  all.forEach(i => {
    const ts = i.done_at || i.created_at;
    if (ts && (!lastByList[i.list_id] || ts > lastByList[i.list_id])) lastByList[i.list_id] = ts;
  });

  /* Te toca a ti */
  const myTasks = all.filter(i => !i.is_done && !i.not_found && i.assigned_to === me.id && listById[i.list_id]).slice(0, 4);
  const nfItems = all.filter(i => !i.is_done && i.not_found && listById[i.list_id]).slice(0, 4);

  /* Actividad reciente — desde el log real (fam_activity) */
  const ACT_VERB = {
    added: 'agregó', undone: 'desmarcó ↩️', not_found: 'no encontró 😕',
    found: 'repuso a pendiente', deleted: 'eliminó 🗑️', edited: 'editó ✏️',
  };
  const feed = (acts || [])
    .filter(a => listById[a.list_id])
    .slice(0, 5)
    .map(a => {

/* --- páginas de detalle de las tarjetas del home --- */
async function seeView(kind){
  const TITLES = { pending:'Pendientes', today:'Listos hoy', week:'Esta semana', month:'Gasto del mes' };
  $app.innerHTML = pageHead(TITLES[kind]) + SKEL;
  wireBack();
  const iso60 = new Date(Date.now() - 60*86400000).toISOString();
  const [{ data: lists }, { data: items }, { data: users }] = await Promise.all([
    sb.from('fam_list').select('*').eq('is_archived', false),
    sb.from('fam_item').select('list_id, content, quantity, is_done, done_at, done_by, created_at, price, assigned_to, not_found').or(`is_done.eq.false,done_at.gte.${iso60}`),
    sb.from('sys_user').select('id, first_name, display_name, email'),
  ]);
  const listById = Object.fromEntries((lists||[]).map(l => [l.id, l]));
  const userById = Object.fromEntries((users||[]).map(u => [u.id, u]));
  const lEmoji = l => l.icon ? esc(l.icon) : (TYPES[l.list_type] || TYPES.otra).e;
  const now = new Date();
  const sameDay = (a,b) => a.toDateString() === b.toDateString();
  const week0 = new Date(now); week0.setDate(now.getDate() - 6); week0.setHours(0,0,0,0);

  const match = i => {
    if (!listById[i.list_id]) return false;
    if (kind === 'pending') return !i.is_done;
    if (!i.is_done || !i.done_at) return false;
    const d = new Date(i.done_at);
    if (kind === 'today') return sameDay(d, now);
    if (kind === 'week') return d >= week0;
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  };
  const rows = (items||[]).filter(match)
    .sort((a,b) => ((b.done_at||b.created_at||'')).localeCompare(a.done_at||a.created_at||''));
  const total = rows.reduce((s,i) => s + (Number(i.price)||0), 0);
  const byList = {};
  rows.forEach(i => (byList[i.list_id] = byList[i.list_id] || []).push(i));

  $app.innerHTML = pageHead(TITLES[kind]) + `
    <div class="chip-row">
      <span class="chip">${rows.length} ítem${rows.length!==1?'s':''}</span>
      ${total ? `<span class="chip orange">💰 ${clp(total)}</span>` : ''}
    </div>
    ${!rows.length ? `<div class="empty"><div class="big">${kind==='pending'?'🎉':'🌙'}</div>${kind==='pending'?'Nada pendiente. ¡Todo al día!':'Sin movimientos en este período.'}</div>`
      : Object.entries(byList).map(([lid, its]) => {
        const l = listById[lid];
        return `
          <div class="section-label">${lEmoji(l)} ${esc(l.name)}</div>
          ${its.map(i => `
            <button class="mini-item" data-goto="${lid}">
              <span class="mt">${esc(i.content)}${i.quantity?` <span class="qty" style="font-weight:600">· ${esc(i.quantity)}</span>`:''}
                <small>${i.is_done && i.done_by && userById[i.done_by]
                  ? `✓ ${esc(firstName(userById[i.done_by]))} · ${fmtWhen(i.done_at)}`
                  : (i.not_found ? '😕 No se encontró'
                    : (i.assigned_to && userById[i.assigned_to] ? `🙋 Le toca a ${esc(firstName(userById[i.assigned_to]))}` : 'Pendiente'))}</small>
              </span>
              ${i.price ? `<span class="price-tag">${clp(i.price)}</span>` : ''}
              <span class="arr">›</span>
            </button>`).join('')}`;
      }).join('')}`;
  wireBack();
  document.querySelectorAll('[data-goto]').forEach(b => b.onclick = () => location.hash = `#/list/${b.dataset.goto}`);
}

/* ---------------- Fotos ---------------- */
async function compressImage(file, maxDim = 1000){
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i); i.onerror = rej;
    i.src = URL.createObjectURL(file);
  });
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const c = document.createElement('canvas');
  c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
  c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
  URL.revokeObjectURL(img.src);
  return new Promise(res => c.toBlob(res, 'image/jpeg', .8));
}

async function uploadPhoto(listId, file){
  const blob = await compressImage(file);
  const path = `${listId}/${crypto.randomUUID()}.jpg`;
  const { error } = await sb.storage.from('fam-photos').upload(path, blob, { contentType:'image/jpeg' });
  if (error) throw error;
  return sb.storage.from('fam-photos').getPublicUrl(path).data.publicUrl;
}

    document.getElementById('btnBack').onclick = () => { location.hash = ''; };
    channel = sb.channel('wait-'+id)
      .on('postgres_changes', { event:'*', schema:'public', table:'fam_list_member', filter:`list_id=eq.${id}` }, () => listView(id))
      .subscribe();
    return;
  }

  const myRole = myMember?.status === 'approved' ? myMember.member_role : 'viewer';
  const canEdit = myRole === 'owner' || myRole === 'editor';
  const approvedMembers = (members||[]).filter(m => m.status === 'approved');
  const pendingReqs = (members||[]).filter(m => m.status === 'pending');
  const userById = {}; (members||[]).forEach(m => userById[m.user_id] = m.sys_user);

  $app.innerHTML = `
    <div class="topbar">
      <button class="back-btn" id="btnBack">←</button>
      <div class="brand" style="font-size:1.1rem">${list.icon ? esc(list.icon) : t.e} ${esc(list.name)}</div>
      <button class="back-btn" id="btnInvite" title="Invitar">🎟️</button>
      <button class="back-btn" id="btnSettings" title="Opciones">⚙️</button>
    </div>
    <div class="chip-row">
      <span class="chip">${esc(list.custom_type) || t.label}</span>
      <span class="chip orange" id="chipPending"></span>
      <span class="chip" id="chipSpend" style="display:none"></span>
    </div>
    <div class="members members-line" id="membersRow"></div>
    <div id="requests"></div>
    <div id="items"></div>
    ${canEdit && list.list_type !== 'externa' ? `
    <button class="fab" id="btnAdd" title="Agregar ítem">＋</button>` : ''}
  `;

  document.getElementById('btnBack').onclick = () => { location.hash = ''; };
  document.getElementById('btnInvite').onclick = () => shareSheet(list, t);

  const $members = document.getElementById('membersRow');
  $members.innerHTML = approvedMembers.map(m => {
    const u = m.sys_user;
    return `<div class="avatar" title="${esc(firstName(u))}">${u?.avatar_url ? `<img src="${esc(u.avatar_url)}" alt="">` : esc(initial(u))}</div>`;
  }).join('') + `<div class="mnames">${approvedMembers.map(m => esc(firstName(m.sys_user))).join(', ')}</div>`;

  /* Solicitudes de ingreso (solo owner) */
  if (myRole === 'owner' && pendingReqs.length){
    const $req = document.getElementById('requests');
    $req.innerHTML = `<div class="section-label" style="margin-top:2px">Quieren unirse</div>` +
      pendingReqs.map(m => {
        const u = m.sys_user;
        return `<div class="req" data-uid="${m.user_id}">
          <div class="avatar">${u?.avatar_url ? `<img src="${esc(u.avatar_url)}" alt="">` : esc(initial(u))}</div>
          <div class="nm">${esc(firstName(u))}<small>${esc(u?.email || '')}</small></div>
          <button class="ok" data-approve>Aceptar</button>
          <button class="no" data-reject aria-label="Rechazar">✕</button>
        </div>`;
      }).join('');
    $req.querySelectorAll('[data-approve]').forEach(b => b.onclick = async () => {
      const uid = b.closest('.req').dataset.uid;
      b.disabled = true;
      const { error } = await sb.from('fam_list_member').update({ status: 'approved' })
        .eq('list_id', id).eq('user_id', uid);
      if (error){ b.disabled = false; return toast('Error: ' + error.message); }
      toast('Miembro aprobado ✓');
      listView(id);
    });
    $req.querySelectorAll('[data-reject]').forEach(b => b.onclick = async () => {
      const row = b.closest('.req');
      const nm = row.querySelector('.nm').firstChild.textContent;
      const ok = await confirmSheet({
        title: 'Rechazar solicitud', danger: true,
        message: `${nm} no podrá entrar a la lista (puede volver a solicitar con el código).`,
        confirmLabel: 'Sí, rechazar',
      });
      if (!ok) return;
      const { error } = await sb.from('fam_list_member').delete()
        .eq('list_id', id).eq('user_id', row.dataset.uid);
      if (error) return toast('Error: ' + error.message);
      listView(id);
    });
  }

  document.getElementById('btnSettings').addEventListener('click', () => settingsSheet(list, myRole));

  /* --- lista externa: botón para abrir el carrito, sin ítems --- */
  if (list.list_type === 'externa'){
    const $items = document.getElementById('items');
    document.getElementById('chipPending').textContent = '🔗 Carrito externo';
    $items.innerHTML = `
      <a class="btn-primary" style="display:block; text-align:center; text-decoration:none; margin-top:14px"
         href="${esc(list.external_url || '#')}" target="_blank" rel="noopener">🛒 Abrir carrito en la tienda</a>
      ${list.external_url ? `<p style="color:var(--muted); font-size:.78rem; text-align:center; word-break:break-all; margin-top:10px">${esc(list.external_url)}</p>` : `<div class="empty" style="margin-top:12px">Sin URL configurada — agrégala en ⚙️</div>`}`;
    channel = sb.channel('list-'+id)
      .on('postgres_changes', { event:'*', schema:'public', table:'fam_list_member', filter:`list_id=eq.${id}` }, () => {
        if (location.hash.includes(id)) listView(id);
      })
      .on('postgres_changes', { event:'*', schema:'public', table:'fam_list', filter:`id=eq.${id}` }, () => {
        if (location.hash.includes(id)) listView(id);
      })
      .subscribe();
    return;
  }

  /* --- ítems --- */
  const $items = document.getElementById('items');
  let tab = 'pend';
  let itemById = {};
  const doneWord = list.list_type === 'compras' ? 'comprado' : 'completado';

  async function loadItems(){
    const { data: items, error } = await sb.from('fam_item').select('*')
      .eq('list_id', id)
      .order('created_at', { ascending: false });
    if (error) return;
    itemById = Object.fromEntries(items.map(i => [i.id, i]));

    const pendNormal = items.filter(i => !i.is_done && !i.not_found);
    const pendNf = items.filter(i => !i.is_done && i.not_found);
    const pendItems = items.filter(i => !i.is_done);
    const doneItems = items.filter(i => i.is_done)
      .sort((a,b) => (b.done_at||'').localeCompare(a.done_at||''));
    document.getElementById('chipPending').textContent =
      pendItems.length ? `${pendItems.length} pendiente${pendItems.length>1?'s':''}` : 'Todo listo ✓';
    const spend = doneItems.reduce((s,i) => s + (Number(i.price)||0), 0);
    const $sp = document.getElementById('chipSpend');
    if (spend){ $sp.style.display=''; $sp.textContent = `💰 ${clp(spend)}`; } else $sp.style.display='none';

    const renderItem = i => {
      const sub = [];
      if (i.quantity) sub.push(esc(i.quantity));
      if (i.is_done && i.done_by && userById[i.done_by]) sub.push(`✓ ${esc(firstName(userById[i.done_by]))} · ${fmtWhen(i.done_at)}`);
      else if (i.not_found) sub.push(`<span class="nf-txt">😕 No se encontró</span>`);
      else if (i.assigned_to && userById[i.assigned_to]) sub.push(`🙋 ${esc(firstName(userById[i.assigned_to]))}`);
      return `
      <div class="item ${i.is_done?'done':''}" data-id="${i.id}">
        <span class="status ${i.is_done?'ok':(i.not_found?'nf':'')}">${i.is_done?'✓':(i.not_found?'!':'')}</span>
        ${i.photo_url ? `<img class="thumb" src="${esc(i.photo_url)}" alt="" loading="lazy" data-open>` : ''}
        <div class="body" data-open>
          <div class="content">${esc(i.content)}</div>
          ${sub.length ? `<div class="who">${sub.join(' · ')}</div>` : ''}
        </div>
        ${i.price ? `<span class="price-tag">${clp(i.price)}</span>` : ''}
        ${i.link ? `<a class="linkico" href="${esc(i.link)}" target="_blank" rel="noopener" title="Abrir link">🔗</a>` : ''}
        ${canEdit?`<button class="del" data-del aria-label="Eliminar">✕</button>`:''}
      </div>`;
    };

    const capDone = doneWord.charAt(0).toUpperCase() + doneWord.slice(1);
    $items.innerHTML = !items.length
      ? `<div class="empty"><div class="big">${t.e}</div>Lista vacía. ${canEdit?'Agrega el primer ítem abajo.':''}</div>`
      : `
        <div class="tabs">
          <button class="tab ${tab==='pend'?'on':''}" data-tab="pend">Pendientes <b>${pendItems.length}</b></button>
          <button class="tab ${tab==='done'?'on':''}" data-tab="done">${capDone}s <b>${doneItems.length}</b></button>
        </div>
        ${tab === 'pend' ? `
          ${pendNormal.map(renderItem).join('') ||
            (!pendNf.length ? `<div class="empty"><div class="big">🎉</div>Nada pendiente. ¡Todo ${doneWord}!</div>` : '')}
          ${pendNf.length ? `
            <div class="done-head" style="color:var(--acc); filter:saturate(1.3) brightness(.85)">😕 No se encontró (${pendNf.length})</div>
            ${pendNf.map(renderItem).join('')}` : ''}`
        : `${doneItems.map(renderItem).join('') ||
            `<div class="empty"><div class="big">🌙</div>Nada ${doneWord} todavía.</div>`}`}`;

    $items.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { tab = b.dataset.tab; loadItems(); });

    const toggleItem = async (i) => {
      const done = !i.is_done;
      let extra = {};
      if (done){
        const res = await markDoneSheet(i, doneWord);
        if (!res) return;
        if (res.__notFound){
          const { error } = await sb.from('fam_item').update({ not_found: true }).eq('id', i.id);
          if (error) return toast('Error: '+error.message);
          toast('Marcado: no se encontró 😕');
          return loadItems();
        }
        extra = res;
      }
      const { error } = await sb.from('fam_item').update({
        is_done: done,
        done_by: done ? session.user.id : null,
        done_at: done ? new Date().toISOString() : null,
        not_found: false,
        ...extra,
      }).eq('id', i.id);
      if (error) return toast('Error: '+error.message);
      buzz();
      loadItems();
    };

    const notFoundItem = async (i) => {
      const { error } = await sb.from('fam_item').update({ not_found: !i.not_found }).eq('id', i.id);
      if (error) return toast('Error: '+error.message);
      toast(i.not_found ? 'Marcado como pendiente normal' : 'Marcado: no se encontró 😕');
      loadItems();
    };

    $items.querySelectorAll('[data-open]').forEach(el => el.onclick = () => {
      const i = itemById[el.closest('.item').dataset.id];
      if (i) itemDetailSheet(i, userById, canEdit
        ? { listId: id, members: approvedMembers, doneWord, onToggle: toggleItem, onNotFound: notFoundItem }
        : null);
    });
    $items.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
      const i = itemById[b.closest('.item').dataset.id];
      const ok = await confirmSheet({
        title: 'Eliminar ítem', danger: true,
        message: `Se eliminará "${i.content}" de la lista para todos.`,
        confirmLabel: 'Sí, eliminar',
      });
      if (!ok) return;
      const { error } = await sb.from('fam_item').delete().eq('id', i.id);
      if (error) return toast('Error: '+error.message);
      loadItems();
    });
  }
  await loadItems();

  if (canEdit && document.getElementById('btnAdd')){
    document.getElementById('btnAdd').onclick = () =>
      itemFormSheet({ listId: id, members: approvedMembers });
  }

  channel = sb.channel('list-'+id)
    .on('postgres_changes', { event:'*', schema:'public', table:'fam_item', filter:`list_id=eq.${id}` }, loadItems)
    .on('postgres_changes', { event:'*', schema:'public', table:'fam_list_member', filter:`list_id=eq.${id}` }, () => {
      if (location.hash.includes(id)) listView(id);
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'fam_list', filter:`id=eq.${id}` }, () => {
      if (location.hash.includes(id)) listView(id);
    })
    .subscribe();
}

/* --- formulario de ítem: crear o editar (precio, link, foto, responsable) --- */
function itemFormSheet({ listId, members = [], item = null, prefill = '' }){
  let photoFile = null;
  let assigned = item?.assigned_to || null;
  const isEdit = !!item;
  const ov = sheet(`
    <h3>${isEdit ? 'Editar ítem' : 'Agregar con detalle'}</h3>
    <div class="field"><label>¿Qué?</label><input id="dContent" value="${esc(item?.content || prefill)}" placeholder="Ej: Arena para gatos" maxlength="120" autocomplete="off"></div>
    <div class="field-row">
      <div class="field"><label>Cantidad (opcional)</label><input id="dQty" value="${esc(item?.quantity || '')}" placeholder="2 un · 500 g · 1 caja" maxlength="30" autocomplete="off"></div>
      <div class="field"><label>Precio (opcional)</label><input id="dPrice" type="number" inputmode="numeric" min="0" value="${item?.price ? Number(item.price) : ''}" placeholder="4990"></div>
    </div>
    ${members.length > 1 ? `
    <div class="field"><label>¿A quién le toca?</label>
      <div class="type-grid" style="grid-template-columns:repeat(auto-fill,minmax(74px,1fr))">
        <button class="type-opt ${!assigned ? 'sel' : ''}" data-a=""><span class="e">🤷</span>Nadie</button>
        ${members.map(m => `<button class="type-opt ${assigned === m.user_id ? 'sel' : ''}" data-a="${m.user_id}">
          <span class="e">${m.sys_user?.avatar_url ? `<img src="${esc(m.sys_user.avatar_url)}" style="width:22px;height:22px;border-radius:50%;object-fit:cover">` : '👤'}</span>${esc(firstName(m.sys_user))}
        </button>`).join('')}
      </div>
    </div>` : ''}
    <div class="field"><label>Link del producto (opcional)</label><input id="dLink" type="url" value="${esc(item?.link || '')}" placeholder="https://…" autocomplete="off"></div>
    <div class="field"><label>Foto</label>
      <div class="photo-drop">
        <img id="dPreview" src="${esc(item?.photo_url || '')}" style="${item?.photo_url ? '' : 'display:none'}" alt="">
        <span class="txt" id="dDropTxt">${item?.photo_url ? 'Foto actual (puedes cambiarla)' : 'Sin foto todavía'}</span>
        <button class="btn-mini" id="dPhotoBtn" type="button">📷 ${item?.photo_url ? 'Cambiar' : 'Agregar'}</button>
      </div>
      <input id="dPhoto" type="file" accept="image/*" style="display:none">
    </div>
    <button class="btn-primary" id="dSave">${isEdit ? 'Guardar cambios' : 'Agregar a la lista'}</button>
    <button class="btn-ghost" data-close>Cancelar</button>`);

  ov.querySelectorAll('[data-a]').forEach(b => b.onclick = () => {
    assigned = b.dataset.a || null;
    ov.querySelectorAll('[data-a]').forEach(x => x.classList.toggle('sel', x===b));
  });

  const photoInput = ov.querySelector('#dPhoto');
  ov.querySelector('#dPhotoBtn').onclick = () => photoInput.click();
  photoInput.onchange = () => {
    photoFile = photoInput.files[0] || null;
    if (photoFile){
      const img = ov.querySelector('#dPreview');
      img.src = URL.createObjectURL(photoFile); img.style.display = '';
      ov.querySelector('#dDropTxt').textContent = 'Foto lista ✓';
    }
  };
  if (!isEdit) ov.querySelector('#dContent').focus();
  ov.querySelector('#dSave').onclick = async (e) => {
    const content = ov.querySelector('#dContent').value.trim();
    if (!content) return ov.querySelector('#dContent').focus();
    e.target.disabled = true; e.target.textContent = 'Guardando…';
    try{
      let photo_url = item?.photo_url || null;
      if (photoFile){
        e.target.textContent = 'Subiendo foto…';
        photo_url = await uploadPhoto(listId, photoFile);
      }
      const price = parseFloat(ov.querySelector('#dPrice').value);
      const payload = {
        content,
        quantity: ov.querySelector('#dQty').value.trim() || null,
        price: isNaN(price) ? null : price,
        link: ov.querySelector('#dLink').value.trim() || null,
        photo_url,
        assigned_to: assigned,
      };
      const { error } = isEdit
        ? await sb.from('fam_item').update(payload).eq('id', item.id)
        : await sb.from('fam_item').insert({ ...payload, list_id: listId, created_by: session.user.id });
      if (error) throw error;
      ov.remove(); toast(isEdit ? 'Ítem actualizado ✓' : 'Agregado ✓');
    }catch(err){
      e.target.disabled = false;
      e.target.textContent = isEdit ? 'Guardar cambios' : 'Agregar a la lista';
      toast('Error: ' + err.message);
    }
  };
}

/* --- detalle de ítem --- */
function itemDetailSheet(i, userById, ctx = null){
  const rows = [];
  if (i.quantity) rows.push(['Cantidad', esc(i.quantity)]);
  if (i.price) rows.push(['Precio', clp(i.price)]);
  if (i.assigned_to && userById[i.assigned_to]) rows.push(['Le toca a', esc(firstName(userById[i.assigned_to]))]);
  if (i.is_done && i.done_by && userById[i.done_by])
    rows.push(['Marcado por', `${esc(firstName(userById[i.done_by]))} · ${fmtWhen(i.done_at)}`]);
  rows.push(['Agregado', fmtWhen(i.created_at)]);
  const ov = sheet(`
    ${i.photo_url ? `<img class="detail-photo" src="${esc(i.photo_url)}" alt="">` : ''}
    <h3>${esc(i.content)}</h3>
    <div class="detail-rows">${rows.map(([k,v]) => `<div class="dr"><b>${k}</b><span>${v}</span></div>`).join('')}</div>
    ${ctx ? (i.is_done
      ? `<button class="btn-ghost" id="dtToggle">↩️ Desmarcar</button>`
      : `<button class="btn-primary" id="dtToggle">✓ Marcar como ${esc(ctx.doneWord)}</button>`) : ''}
    ${ctx && !i.is_done ? `<button class="btn-ghost" id="dtNf">${i.not_found ? '↩️ Sí se encontró (volver a pendiente normal)' : '🚫 No se encontró'}</button>` : ''}
    ${i.link ? `<a class="${ctx && !i.is_done ? 'btn-ghost' : 'btn-primary'}" style="display:block; text-align:center; text-decoration:none" href="${esc(i.link)}" target="_blank" rel="noopener">Abrir link del producto 🔗</a>` : ''}
    ${ctx ? `<button class="btn-ghost" id="dtEdit" style="color:var(--pri-dark)">✏️ Editar ítem</button>` : ''}
    <button class="btn-ghost" data-close>Cerrar</button>`);
  if (ctx){
    ov.querySelector('#dtToggle').onclick = () => {
      ov.remove();
      ctx.onToggle(i);
    };
    ov.querySelector('#dtNf')?.addEventListener('click', () => {
      ov.remove();
      ctx.onNotFound(i);
    });
    ov.querySelector('#dtEdit').onclick = () => {
      ov.remove();
      itemFormSheet({ listId: ctx.listId, members: ctx.members, item: i });
    };
  }
}

/* ---------------- Utilidades UI ---------------- */
/* Al marcar comprado: confirmar + ajustar cantidad y precio finales */
function markDoneSheet(i, doneWord){
  return new Promise(resolve => {
    let settled = false;
    const cap = doneWord.charAt(0).toUpperCase() + doneWord.slice(1);
    /* Solo pregunta por cantidad/precio finales si el ítem los traía */
    const askQty = !!i.quantity;
    const askPrice = i.price != null && i.price !== '';
    const wantsDetail = askQty || askPrice;
    const ov = sheet(`
      <h3>¿${cap}?</h3>
      <p class="msg">${wantsDetail
        ? `"${esc(i.content)}" — ajusta lo final si cambió:`
        : `Marcar "${esc(i.content)}" como ${esc(doneWord)}.`}</p>
      ${wantsDetail ? `
      <div class="field-row">
        ${askQty ? `<div class="field"><label>Cantidad final</label><input id="mkQty" value="${esc(i.quantity || '')}" placeholder="2 un" maxlength="30" autocomplete="off"></div>` : ''}
        ${askPrice ? `<div class="field"><label>Precio final (CLP)</label><input id="mkPrice" type="number" inputmode="numeric" min="0" value="${Number(i.price)}" placeholder="4990"></div>` : ''}
      </div>` : ''}
      <button class="btn-primary" id="mkOk">Sí, ${doneWord} ✓</button>
      ${!i.not_found ? `<button class="btn-ghost" id="mkNf" style="color:var(--acc); filter:saturate(1.3) brightness(.85); font-weight:800">🚫 No se encontró</button>` : ''}
      <button class="btn-ghost" data-close>Cancelar</button>`);
    ov.querySelector('#mkNf')?.addEventListener('click', () => {
      settled = true; ov.remove(); resolve({ __notFound: true });
    });
    ov.querySelector('#mkOk').onclick = () => {
      settled = true;
      const out = {};
      if (askQty){
        const q = ov.querySelector('#mkQty').value.trim();
        out.quantity = q || null;
      }
      if (askPrice){
        const p = parseFloat(ov.querySelector('#mkPrice').value);
        out.price = isNaN(p) ? null : p;
      }
      ov.remove();
      resolve(out);
    };
    const obs = new MutationObserver(() => {
      if (!document.body.contains(ov)){ obs.disconnect(); if (!settled) resolve(null); }
    });
    obs.observe(document.body, { childList: true });
  });
}

function confirmSheet({ title, message, confirmLabel = 'Confirmar', danger = false }){
  return new Promise(resolve => {
    let settled = false;
    const ov = sheet(`
      <h3 ${danger ? 'style="color:var(--danger)"' : ''}>${esc(title)}</h3>
      <p class="msg">${esc(message)}</p>
      <button class="btn-primary ${danger ? 'danger' : ''}" id="cOk">${esc(confirmLabel)}</button>
      <button class="btn-ghost" data-close>Cancelar</button>`);
    ov.querySelector('#cOk').onclick = () => { settled = true; ov.remove(); resolve(true); };
    const obs = new MutationObserver(() => {
      if (!document.body.contains(ov)){ obs.disconnect(); if (!settled) resolve(false); }
    });
    obs.observe(document.body, { childList: true });
  });
}

function settingsSheet(list, myRole = 'owner'){
  /* Miembro no-owner: solo puede salir de la lista */
  if (myRole !== 'owner'){
    const ov = sheet(`
      <h3>Opciones</h3>
      <p class="msg">Eres ${myRole === 'editor' ? 'editor' : 'lector'} de "${esc(list.name)}". Solo quien la creó puede modificarla.</p>
      <button class="btn-danger-ghost" id="oLeave">Salir de la lista</button>
      <button class="btn-ghost" data-close>Cerrar</button>`);
    ov.querySelector('#oLeave').onclick = async () => {
      ov.remove();
      const ok = await confirmSheet({
        title: 'Salir de la lista', danger: true,
        message: `Dejarás de ver "${list.name}". Puedes volver a unirte con el código.`,
        confirmLabel: 'Sí, salir',
      });
      if (!ok) return;
      const { error } = await sb.from('fam_list_member').delete()
        .eq('list_id', list.id).eq('user_id', session.user.id);
      if (error) return toast('Error: ' + error.message);
      location.hash = '';
    };
    return;
  }

  let type = list.list_type;
  const ov = sheet(`
    <h3>Configurar lista</h3>
    <div class="field"><label>Nombre</label><input id="sName" value="${esc(list.name)}" maxlength="60" autocomplete="off"></div>
    <div class="field"><label>Tipo</label>
      <div class="type-grid">${Object.entries(TYPES).map(([k,t]) =>
        `<button class="type-opt ${k===type?'sel':''}" data-t="${k}"><span class="e">${t.e}</span>${t.label}</button>`).join('')}
      </div>
    </div>
    <div id="sOtraWrap" style="display:${type==='otra'?'':'none'}">
      <div class="field-row">
        <div class="field"><label>¿De qué es?</label><input id="sCustom" value="${esc(list.custom_type||'')}" placeholder="Ej: Regalos" maxlength="30" autocomplete="off"></div>
        <div class="field"><label>Emoji</label><input id="sEmoji" value="${esc(list.icon||'')}" placeholder="🎁" maxlength="4" autocomplete="off" style="text-align:center; font-size:1.2rem"></div>
      </div>
    </div>
    <div id="sExtWrap" style="display:${type==='externa'?'':'none'}">
      <div class="field"><label>URL del carrito</label><input id="sExtUrl" type="url" value="${esc(list.external_url||'')}" placeholder="https://…" autocomplete="off"></div>
    </div>
    <button class="btn-primary" id="sSave">Guardar cambios</button>
    <button class="btn-danger-ghost" id="sArchive">Archivar lista</button>
    <button class="btn-danger-ghost" id="sDelete">Eliminar lista</button>
    <button class="btn-ghost" data-close>Cancelar</button>`);
  ov.querySelectorAll('.type-opt').forEach(b => b.onclick = () => {
    type = b.dataset.t;
    ov.querySelectorAll('.type-opt').forEach(x => x.classList.toggle('sel', x===b));
    ov.querySelector('#sOtraWrap').style.display = type === 'otra' ? '' : 'none';
    ov.querySelector('#sExtWrap').style.display = type === 'externa' ? '' : 'none';
  });
  ov.querySelector('#sSave').onclick = async (e) => {
    const name = ov.querySelector('#sName').value.trim();
    if (!name) return;
    if (type === 'otra' && !ov.querySelector('#sCustom').value.trim())
      return ov.querySelector('#sCustom').focus();
    e.target.disabled = true;
    const { error } = await sb.from('fam_list').update({
      name, list_type: type,
      custom_type: type === 'otra' ? ov.querySelector('#sCustom').value.trim() : null,
      icon: type === 'otra' ? (ov.querySelector('#sEmoji').value.trim() || null)
          : type === 'externa' ? list.icon : null,
      external_url: type === 'externa' ? (ov.querySelector('#sExtUrl').value.trim() || null) : null,
    }).eq('id', list.id);
    if (error){ e.target.disabled = false; return toast('Error: ' + error.message); }
    ov.remove(); toast('Lista actualizada ✓');
  };
  ov.querySelector('#sDelete').onclick = async () => {
    ov.remove();
    const ok = await confirmSheet({
      title: 'Eliminar lista', danger: true,
      message: `Se eliminará "${list.name}" con todos sus ítems, para todos los miembros. Esto no se puede deshacer. Si solo quieres guardarla, usa Archivar.`,
      confirmLabel: 'Sí, eliminar',
    });
    if (!ok) return;
    const { error } = await sb.from('fam_list').delete().eq('id', list.id);
    if (error) return toast('Error: ' + error.message);
    location.hash = '';
  };
  ov.querySelector('#sArchive').onclick = async () => {
    ov.remove();
    const ok = await confirmSheet({
      title: 'Archivar lista', danger: true,
      message: `"${list.name}" dejará de aparecer para todos los miembros, pero no se elimina.`,
      confirmLabel: 'Sí, archivar',
    });
    if (!ok) return;
    const { error } = await sb.from('fam_list').update({ is_archived: true }).eq('id', list.id);
    if (error) return toast('Error: ' + error.message);
    location.hash = '';
  };
}

function sheet(html){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `<div class="sheet">${html}</div>`;
  ov.addEventListener('click', e => { if (e.target === ov || e.target.hasAttribute('data-close')) ov.remove(); });
  document.body.appendChild(ov);
  return ov;
}

/* ---------------- Service worker ---------------- */
if ('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
  let hadCtrl = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!hadCtrl){ hadCtrl = true; return; }
    document.querySelector('.toast')?.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.cursor = 'pointer';
    t.textContent = '✨ Nueva versión — toca para actualizar';
    t.onclick = () => location.reload();
    document.body.appendChild(t);
  });
}

init();
</script>
</body>
</html>
